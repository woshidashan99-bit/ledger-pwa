<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <title>简易记账</title>
  <style>
    :root { color-scheme: light dark; }

    /* ===== 背景图层（可选） =====
       1) 把 bg.jpg 放到仓库根目录
       2) 透明度调 body::after 的 rgba 最后一个数字（0~1）
    */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("./bg.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:-2;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: rgba(11,18,32,0.78); /* 透明度：0.78 越大越暗，越小越透 */
      z-index:-1;
    }

    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial; margin: 0; background:#0b1220; color:#e5e7eb; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
    .card { background:#0f172a; border:1px solid #1f2937; border-radius: 14px; padding: 14px; margin: 12px 0; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .row { display:flex; gap:10px; flex-wrap: wrap; }
    label { font-size: 12px; opacity: .85; display:block; margin-bottom: 6px;}

    /* ===== 统一表单控件高度（解决 iOS month 输入框高度不一致） ===== */
    input, select, button, textarea {
      width: 100%; box-sizing: border-box;
      border-radius: 10px; border:1px solid #334155;
      padding: 10px; background:#0b1220; color:#e5e7eb;
      outline: none;

      height: 44px;
      line-height: 44px;
    }
    textarea {
      height: auto;
      line-height: 1.4;
      min-height: 44px;
      padding-top: 10px;
      padding-bottom: 10px;
      resize: vertical;
    }

    .col { flex:1 1 160px; min-width: 160px; }
    .btn { cursor:pointer; border:0; background:#2563eb; }
    .btn:active { transform: translateY(1px); }
    .btn2 { background:#334155; }
    .danger { background:#dc2626; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #1f2937; text-align:left; font-size: 14px; }
    .muted { opacity:.75; font-size: 12px; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid #334155; border-radius:999px; font-size:12px; opacity:.9; }
    .sum { display:flex; gap:10px; flex-wrap: wrap; }
    .sum .card { flex:1 1 160px; margin:0; }
    .right { text-align:right; }
    .pos { color:#34d399; }
    .neg { color:#f87171; }
    .top { display:flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }

    /* ===== 筛选区域两列等宽（关键字/月份框一致） ===== */
    .filter-row .col {
      flex: 1 1 0;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>简易记账（离线可用）</h1>
      <div class="muted" id="hint">数据仅保存在本机</div>
    </div>

    <div class="sum">
      <div class="card"><div class="muted">本月收入</div><div id="mIn" style="font-size:22px;">0</div></div>
      <div class="card"><div class="muted">本月支出</div><div id="mOut" style="font-size:22px;">0</div></div>
      <div class="card"><div class="muted">本月结余</div><div id="mNet" style="font-size:22px;">0</div></div>
    </div>

    <!-- ===== 记账录入 ===== -->
    <div class="card">
      <div class="row">
        <div class="col">
          <label>类型</label>
          <select id="type">
            <option value="out">支出</option>
            <option value="in">收入</option>
          </select>
        </div>
        <div class="col">
          <label>金额</label>
          <input id="amount" type="number" inputmode="decimal" placeholder="例如 25.5" />
        </div>
        <div class="col">
          <label>分类</label>
          <select id="cat">
            <option>餐饮</option><option>交通</option><option>购物</option><option>娱乐</option>
            <option>房租</option><option>水电网</option><option>医疗</option><option>学习</option>
            <option>工资</option><option>其他</option>
          </select>
        </div>
        <div class="col">
          <label>日期</label>
          <input id="date" type="date" />
        </div>
      </div>

      <div class="row">
        <div class="col" style="flex:1 1 100%">
          <label>备注（可选）</label>
          <textarea id="note" placeholder="例如：午饭"></textarea>
        </div>
      </div>

      <div class="row">
        <div class="col"><button class="btn" id="add">添加记录</button></div>
        <div class="col"><button class="btn btn2" id="export">导出JSON</button></div>
        <div class="col"><button class="btn btn2" id="import">导入JSON</button></div>
        <div class="col"><button class="btn danger" id="wipe">清空全部</button></div>
      </div>
      <div class="muted">提示：导出/导入用于备份；换手机时很有用。</div>
    </div>

    <!-- ===== 借款/借出模块（新增） ===== -->
    <div class="card">
      <h1 style="margin:0 0 10px;font-size:18px;">借款/借出记录</h1>

      <div class="row">
        <div class="col">
          <label>借给谁</label>
          <input id="loanTo" placeholder="例如：A" />
        </div>
        <div class="col">
          <label>金额</label>
          <input id="loanAmount" type="number" inputmode="decimal" placeholder="例如 3000" />
        </div>
        <div class="col">
          <label>借出日期</label>
          <input id="loanDate" type="date" />
        </div>
      </div>

      <div class="row">
        <div class="col" style="flex:1 1 100%">
          <label>备注（可选）</label>
          <input id="loanNote" placeholder="例如：3月工资周转" />
        </div>
      </div>

      <div class="row">
        <div class="col"><button class="btn" id="loanAdd">添加借出</button></div>
      </div>

      <table style="margin-top:10px;">
        <thead>
          <tr>
            <th>借出日期</th><th>对象</th><th>备注</th><th class="right">金额</th><th>状态</th><th></th>
          </tr>
        </thead>
        <tbody id="loanList"></tbody>
      </table>
      <div class="muted" id="loanEmpty" style="display:none; padding-top:10px;">暂无借出记录</div>
    </div>

    <!-- ===== 记账列表与筛选 ===== -->
    <div class="card">
      <div class="row filter-row">
        <div class="col">
          <label>筛选月份</label>
          <input id="month" type="month" />
        </div>
        <div class="col">
          <label>关键字（分类/备注）</label>
          <input id="kw" placeholder="例如 餐饮 / 午饭" />
        </div>
        <div class="col">
          <label>&nbsp;</label>
          <button class="btn btn2" id="clearFilter">清除筛选</button>
        </div>
      </div>

      <table>
        <thead>
          <tr><th>日期</th><th>类型</th><th>分类</th><th>备注</th><th class="right">金额</th><th></th></tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
      <div class="muted" id="empty" style="display:none; padding-top:10px;">暂无记录</div>
    </div>
  </div>

  <script>
    const KEY = "pwa_ledger_v1";
    const $ = (id) => document.getElementById(id);

    function todayISO() {
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off * 60000);
      return local.toISOString().slice(0,10);
    }

    function monthISO(dateStr) { return (dateStr || "").slice(0,7); }

    function load() {
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
      catch { return []; }
    }
    function save(items) { localStorage.setItem(KEY, JSON.stringify(items)); }

    function fmt(n) {
      const x = Number(n || 0);
      return x.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function recalc(items) {
      const m = $("month").value || monthISO(todayISO());
      const monthly = items.filter(it => monthISO(it.date) === m);

      let inc=0, out=0;
      for (const it of monthly) {
        const a = Number(it.amount||0);
        if (it.type === "in") inc += a;
        else out += a;
      }
      $("mIn").textContent = fmt(inc);
      $("mOut").textContent = fmt(out);
      const net = inc - out;
      $("mNet").textContent = fmt(net);
      $("mNet").className = net >= 0 ? "pos" : "neg";
    }

    function render() {
      const items = load().sort((a,b)=> (b.date+a.id).localeCompare(a.date+b.id));
      const m = $("month").value;
      const kw = ($("kw").value || "").trim();

      let shown = items;
      if (m) shown = shown.filter(it => monthISO(it.date) === m);
      if (kw) {
        const k = kw.toLowerCase();
        shown = shown.filter(it =>
          (it.cat||"").toLowerCase().includes(k) || (it.note||"").toLowerCase().includes(k)
        );
      }

      const tb = $("list");
      tb.innerHTML = "";
      $("empty").style.display = shown.length ? "none" : "block";

      for (const it of shown) {
        const tr = document.createElement("tr");
        const sign = it.type === "in" ? "+" : "-";
        const cls = it.type === "in" ? "pos" : "neg";
        tr.innerHTML = `
          <td>${it.date}</td>
          <td><span class="pill">${it.type==="in"?"收入":"支出"}</span></td>
          <td>${it.cat || ""}</td>
          <td>${it.note || ""}</td>
          <td class="right ${cls}">${sign}${fmt(it.amount)}</td>
          <td class="right"><button class="btn danger" data-del="${it.id}">删</button></td>
        `;
        tb.appendChild(tr);
      }

      // delete handler
      tb.querySelectorAll("button[data-del]").forEach(btn=>{
        btn.onclick = () => {
          const id = btn.getAttribute("data-del");
          const next = load().filter(x => x.id !== id);
          save(next);
          render();
        };
      });

      recalc(items);
    }

    function addItem() {
      const type = $("type").value;
      const amount = Number($("amount").value);
      const cat = $("cat").value;
      const date = $("date").value || todayISO();
      const note = $("note").value.trim();

      if (!amount || amount <= 0) {
        alert("金额请输入大于 0 的数字");
        return;
      }

      const items = load();
      items.push({
        id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2)),
        type, amount, cat, date, note
      });
      save(items);

      $("amount").value = "";
      $("note").value = "";
      render();
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    function exportJSON() {
      const items = load();
      downloadText("ledger-backup.json", JSON.stringify(items, null, 2));
    }

    function importJSON() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json";
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        const text = await file.text();
        try {
          const arr = JSON.parse(text);
          if (!Array.isArray(arr)) throw new Error("not array");
          save(arr);
          render();
          alert("导入成功");
        } catch {
          alert("导入失败：文件格式不对");
        }
      };
      input.click();
    }

    function wipeAll() {
      if (!confirm("确定清空全部记录？此操作不可恢复（除非你导出过备份）")) return;
      save([]);
      render();
    }

    // ===== 借款/借出模块 =====
    const LOAN_KEY = "pwa_loans_v1";

    function loadLoans(){
      try { return JSON.parse(localStorage.getItem(LOAN_KEY) || "[]"); }
      catch { return []; }
    }
    function saveLoans(arr){
      localStorage.setItem(LOAN_KEY, JSON.stringify(arr));
    }

    function renderLoans(){
      const loans = loadLoans().sort((a,b)=> (b.date+a.id).localeCompare(a.date+b.id));
      const tb = $("loanList");
      tb.innerHTML = "";
      $("loanEmpty").style.display = loans.length ? "none" : "block";

      for(const it of loans){
        const status = it.repaid
          ? `已还 (${it.repaidDate || "-"})`
          : `未还`;
        const statusCls = it.repaid ? "pos" : "neg";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${it.date || ""}</td>
          <td>${it.to || ""}</td>
          <td>${it.note || ""}</td>
          <td class="right">${fmt(it.amount)}</td>
          <td class="${statusCls}">${status}</td>
          <td class="right">
            ${it.repaid ? "" : `<button class="btn btn2" data-repay="${it.id}">标记已还</button>`}
            <button class="btn danger" data-ldel="${it.id}">删</button>
          </td>
        `;
        tb.appendChild(tr);
      }

      tb.querySelectorAll("button[data-repay]").forEach(btn=>{
        btn.onclick = () => {
          const id = btn.getAttribute("data-repay");
          const repaidDate = prompt("输入还款日期（YYYY-MM-DD），留空=今天") || "";
          const d = repaidDate.trim() || todayISO();

          const arr = loadLoans().map(x=>{
            if(x.id === id){
              return { ...x, repaid:true, repaidDate:d };
            }
            return x;
          });
          saveLoans(arr);
          renderLoans();
        };
      });

      tb.querySelectorAll("button[data-ldel]").forEach(btn=>{
        btn.onclick = () => {
          const id = btn.getAttribute("data-ldel");
          const arr = loadLoans().filter(x=>x.id !== id);
          saveLoans(arr);
          renderLoans();
        };
      });
    }

    function addLoan(){
      const to = $("loanTo").value.trim();
      const amount = Number($("loanAmount").value);
      const date = $("loanDate").value || todayISO();
      const note = $("loanNote").value.trim();

      if(!to){
        alert("请填写借给谁（例如：A）");
        return;
      }
      if(!amount || amount <= 0){
        alert("金额请输入大于 0 的数字");
        return;
      }

      const arr = loadLoans();
      arr.push({
        id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2)),
        to, amount, date, note,
        repaid:false,
        repaidDate:""
      });
      saveLoans(arr);

      $("loanTo").value = "";
      $("loanAmount").value = "";
      $("loanNote").value = "";
      renderLoans();
    }

    // init
    $("date").value = todayISO();
    $("month").value = monthISO(todayISO());

    $("add").onclick = addItem;
    $("export").onclick = exportJSON;
    $("import").onclick = importJSON;
    $("wipe").onclick = wipeAll;

    $("month").onchange = render;
    $("kw").oninput = () => { clearTimeout(window._t); window._t=setTimeout(render,150); };
    $("clearFilter").onclick = () => { $("kw").value=""; $("month").value = monthISO(todayISO()); render(); };

    // loans init
    $("loanDate").value = todayISO();
    $("loanAdd").onclick = addLoan;

    // service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    }

    render();
    renderLoans();
  </script>
</body>
</html>
