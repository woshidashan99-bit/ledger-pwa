<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>幸福程度调查问卷</title>
  <meta name="description" content="一个可分享链接的简洁调查问卷，收集年龄、性别、工作地点和幸福程度。" />
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 252, 247, 0.92);
      --text: #2a241f;
      --muted: #6e645c;
      --line: rgba(115, 96, 79, 0.22);
      --accent: #bc5d3f;
      --accent-dark: #93432b;
      --accent-soft: #f7dfd6;
      --shadow: 0 24px 60px rgba(100, 70, 44, 0.18);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(237, 168, 130, 0.45), transparent 32%),
        radial-gradient(circle at bottom right, rgba(210, 190, 136, 0.36), transparent 28%),
        linear-gradient(135deg, #f7f1e7 0%, #efe2d3 52%, #ead7c2 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 760px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 36px 32px 22px;
      background:
        linear-gradient(135deg, rgba(188, 93, 63, 0.12), rgba(255, 255, 255, 0)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 251, 246, 0.75));
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(30px, 6vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    form {
      padding: 26px 32px 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 15px;
      font-weight: 700;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.75);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      appearance: none;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: rgba(188, 93, 63, 0.55);
      box-shadow: 0 0 0 4px rgba(188, 93, 63, 0.12);
      transform: translateY(-1px);
    }

    .range-wrap {
      padding: 18px 18px 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 250, 244, 0.86);
    }

    .range-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .score {
      min-width: 78px;
      padding: 10px 14px;
      border-radius: 14px;
      text-align: center;
      background: var(--accent);
      color: #fff8f4;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    input[type="range"] {
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .scale {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #cd7a59);
      color: #fff8f4;
      box-shadow: 0 14px 24px rgba(188, 93, 63, 0.24);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.75);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(248, 237, 226, 0.8);
      color: var(--accent-dark);
      font-size: 14px;
      display: none;
    }

    .footer {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .hero,
      form {
        padding-left: 18px;
        padding-right: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .range-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">在线问卷</div>
      <h1>幸福程度调查问卷</h1>
      <p>请根据你的实际情况填写以下信息。本页面适合直接发链接给他人填写和展示。</p>
    </section>

    <form id="surveyForm">
      <div class="grid">
        <div class="field">
          <label for="age">1. 年龄</label>
          <input id="age" name="age" type="number" min="1" max="120" placeholder="请输入年龄" required />
        </div>

        <div class="field">
          <label for="gender">2. 性别</label>
          <select id="gender" name="gender" required>
            <option value="">请选择</option>
            <option value="男">男</option>
            <option value="女">女</option>
            <option value="其他">其他</option>
            <option value="不方便透露">不方便透露</option>
          </select>
        </div>

        <div class="field full">
          <label for="workplace">3. 工作地点</label>
          <input id="workplace" name="workplace" type="text" placeholder="例如：上海、杭州、深圳南山区" required />
        </div>

        <div class="field full">
          <label for="happiness">4. 幸福程度 1-10 分</label>
          <div class="range-wrap">
            <div class="range-head">
              <div>
                <div class="hint">1 分表示较低，10 分表示非常高</div>
              </div>
              <div class="score" id="scoreValue">8</div>
            </div>
            <input id="happiness" name="happiness" type="range" min="1" max="10" step="1" value="8" />
            <div class="scale">
              <span>1 分</span>
              <span>10 分</span>
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="primary" type="submit">提交问卷</button>
        <button class="secondary" type="button" id="copyLink">复制页面链接</button>
      </div>

      <div class="status" id="status"></div>
      <div class="footer">当前为静态问卷页面，提交后会在本页显示填写结果预览，不会自动上传到服务器。</div>
    </form>
  </main>

  <script>
    const form = document.getElementById("surveyForm");
    const scoreValue = document.getElementById("scoreValue");
    const happiness = document.getElementById("happiness");
    const copyLinkButton = document.getElementById("copyLink");
    const status = document.getElementById("status");

    function showStatus(message) {
      status.textContent = message;
      status.style.display = "block";
    }

    happiness.addEventListener("input", () => {
      scoreValue.textContent = happiness.value;
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const preview = [
        "提交成功，填写内容如下：",
        `年龄：${data.get("age")}`,
        `性别：${data.get("gender")}`,
        `工作地点：${data.get("workplace")}`,
        `幸福程度：${data.get("happiness")} 分`
      ].join(" ");

      showStatus(preview);
    });

    copyLinkButton.addEventListener("click", async () => {
      const link = window.location.href;

      try {
        await navigator.clipboard.writeText(link);
        showStatus("页面链接已复制，可以直接发送给对方。");
      } catch (error) {
        showStatus(`复制失败，请手动复制此链接：${link}`);
      }
    });
  </script>
</body>
</html>
