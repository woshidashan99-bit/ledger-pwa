<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小黄人互动登录页</title>
  <meta name="description" content="带有小黄人互动效果的网页登录界面示例" />
  <style>
    :root {
      --bg-1: #f4ead4;
      --bg-2: #f6c75d;
      --panel: rgba(255, 251, 241, 0.88);
      --panel-line: rgba(102, 76, 18, 0.18);
      --text: #2c2416;
      --muted: #6c5b3f;
      --accent: #1f5fd4;
      --accent-strong: #1647a3;
      --danger: #b4332b;
      --shadow: 0 30px 90px rgba(93, 63, 9, 0.22);
      --card-shadow: 0 16px 32px rgba(120, 88, 23, 0.14);
      --radius: 28px;
      --field-radius: 18px;
      --goggle-metal: #bbc7d8;
      --strap: #33425d;
      --denim: #4d6ec7;
      --denim-dark: #27448d;
      --yellow: #f3d11e;
      --yellow-deep: #e2b81a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.58), transparent 20%),
        radial-gradient(circle at 85% 18%, rgba(255, 220, 120, 0.55), transparent 22%),
        radial-gradient(circle at 80% 78%, rgba(247, 170, 87, 0.45), transparent 20%),
        linear-gradient(135deg, #f9f0db 0%, #f5d469 42%, #eeb94f 100%);
      overflow: hidden;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .scene {
      position: relative;
      width: min(1160px, 100%);
      min-height: 700px;
      border-radius: 36px;
      overflow: hidden;
      background:
        linear-gradient(140deg, rgba(255, 253, 247, 0.5), rgba(255, 236, 181, 0.25)),
        rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      isolation: isolate;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(10px);
      opacity: 0.75;
      z-index: 0;
    }

    .scene::before {
      width: 360px;
      height: 360px;
      left: -70px;
      top: -40px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0));
    }

    .scene::after {
      width: 380px;
      height: 380px;
      right: -100px;
      bottom: -110px;
      background: radial-gradient(circle, rgba(244, 171, 92, 0.45), rgba(244, 171, 92, 0));
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      min-height: 700px;
    }

    .playground {
      position: relative;
      padding: 42px 36px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 248, 224, 0.58), rgba(255, 243, 203, 0.2)),
        linear-gradient(120deg, rgba(255, 255, 255, 0.22), rgba(255, 219, 131, 0.18));
      border-right: 1px solid rgba(157, 112, 24, 0.1);
    }

    .playground-copy {
      max-width: 360px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(122, 93, 28, 0.12);
      box-shadow: 0 8px 18px rgba(93, 63, 9, 0.08);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #765314;
    }

    .title {
      margin: 22px 0 12px;
      font-size: clamp(38px, 6vw, 68px);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .tip-stack {
      margin-top: 26px;
      display: grid;
      gap: 12px;
      max-width: 290px;
    }

    .tip {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.46);
      border: 1px solid rgba(120, 88, 23, 0.08);
      box-shadow: var(--card-shadow);
      font-size: 14px;
      line-height: 1.55;
    }

    .tip strong {
      display: block;
      margin-bottom: 4px;
    }

    .bubble {
      position: absolute;
      left: clamp(22px, 6vw, 74px);
      top: 290px;
      max-width: 290px;
      padding: 14px 16px;
      border-radius: 22px 22px 22px 8px;
      background: rgba(255, 255, 255, 0.95);
      color: #6e1430;
      font-weight: 700;
      line-height: 1.45;
      box-shadow: 0 16px 32px rgba(94, 30, 44, 0.16);
      transform-origin: left bottom;
      opacity: 0;
      transform: translateY(12px) scale(0.94);
      transition: opacity 220ms ease, transform 220ms ease;
      pointer-events: none;
      z-index: 3;
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 22px;
      bottom: -11px;
      width: 18px;
      height: 18px;
      background: inherit;
      transform: rotate(45deg);
      border-bottom-right-radius: 5px;
    }

    .bubble.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .orbit {
      position: absolute;
      left: 48%;
      top: 56%;
      width: min(44vw, 480px);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px dashed rgba(126, 96, 28, 0.16);
      animation: ring-spin 18s linear infinite;
    }

    .spark {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.08);
      animation: sparkle 4.5s ease-in-out infinite;
    }

    .spark.a { left: 8%; top: 25%; }
    .spark.b { right: 12%; top: 13%; animation-delay: 1s; }
    .spark.c { right: 18%; bottom: 14%; animation-delay: 1.8s; }
    .spark.d { left: 13%; bottom: 20%; animation-delay: 2.6s; }

    .minion-group {
      position: absolute;
      left: 49%;
      top: 58%;
      width: min(48vw, 540px);
      height: 420px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .minion-wrap {
      position: absolute;
      width: 244px;
      height: 344px;
      pointer-events: none;
      transform-origin: center bottom;
      filter: drop-shadow(0 20px 26px rgba(96, 66, 10, 0.16));
    }

    .minion-wrap.laughing {
      animation: laugh-shake 460ms ease-in-out 5;
    }

    .minion-wrap::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 94px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(120, 87, 18, 0.14);
      filter: blur(4px);
      z-index: -1;
    }

    .minion-wrap.front-left {
      left: 40px;
      bottom: 10px;
      transform: scale(0.94);
      z-index: 4;
    }

    .minion-wrap.back-left {
      left: -6px;
      bottom: 84px;
      transform: scale(0.72);
      opacity: 0.94;
      z-index: 1;
    }

    .minion-wrap.back-right {
      right: 22px;
      bottom: 98px;
      transform: scale(0.78);
      opacity: 0.96;
      z-index: 2;
    }

    .minion-wrap.front-right {
      right: -4px;
      bottom: -2px;
      transform: scale(1.08);
      z-index: 5;
    }

    .minion-wrap.tall .body {
      height: 232px;
      border-radius: 82px 82px 68px 68px;
    }

    .minion-wrap.tall .leg {
      height: 98px;
    }

    .minion-wrap.short .body {
      height: 194px;
      top: 38px;
      border-radius: 74px 74px 56px 56px;
    }

    .minion-wrap.short .arm {
      top: 156px;
    }

    .minion-wrap.short .leg {
      bottom: 32px;
      height: 72px;
    }

    .minion-wrap.wide .body {
      left: 32px;
      width: 180px;
    }

    .minion-wrap.wide .strap {
      width: 200px;
    }

    .minion-wrap.wide .goggles {
      left: 34px;
    }

    .minion-wrap.wide .mouth {
      left: 64px;
    }

    .minion-wrap.slim .body {
      left: 52px;
      width: 144px;
    }

    .minion-wrap.slim .strap {
      left: -6px;
      width: 156px;
    }

    .minion-wrap.slim .goggles {
      left: 17px;
      gap: 6px;
    }

    .minion-wrap.slim .mouth {
      left: 47px;
    }

    .minion-wrap.slim .overalls .bib {
      left: 40px;
    }

    .minion {
      position: absolute;
      inset: 0;
    }

    .hair {
      position: absolute;
      left: 92px;
      top: 8px;
      width: 58px;
      height: 28px;
    }

    .hair span {
      position: absolute;
      bottom: 0;
      width: 3px;
      height: 22px;
      background: #1a1615;
      border-radius: 999px;
      transform-origin: bottom center;
    }

    .hair span:nth-child(1) { left: 6px; transform: rotate(-36deg); }
    .hair span:nth-child(2) { left: 27px; transform: rotate(-6deg); height: 26px; }
    .hair span:nth-child(3) { left: 46px; transform: rotate(30deg); }

    .body {
      position: absolute;
      left: 42px;
      top: 24px;
      width: 160px;
      height: 216px;
      background: linear-gradient(180deg, #fde54d 0%, var(--yellow) 52%, var(--yellow-deep) 100%);
      border: 4px solid #292116;
      border-radius: 78px 78px 62px 62px;
      overflow: hidden;
      box-shadow:
        inset 0 -12px 0 rgba(145, 101, 10, 0.08),
        0 14px 32px rgba(100, 72, 10, 0.18);
    }

    .body::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 0;
      width: 52px;
      height: 100%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
      transform: skewX(-8deg);
    }

    .strap {
      position: absolute;
      left: -10px;
      top: 68px;
      width: 180px;
      height: 16px;
      background: var(--strap);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.22);
    }

    .goggles {
      position: absolute;
      left: 26px;
      top: 42px;
      display: flex;
      gap: 10px;
      z-index: 1;
    }

    .eye {
      position: relative;
      width: 49px;
      height: 49px;
      border-radius: 50%;
      background: #fff;
      border: 10px solid var(--goggle-metal);
      box-shadow:
        inset 0 0 0 2px rgba(0, 0, 0, 0.1),
        0 3px 0 rgba(30, 35, 45, 0.16);
      overflow: hidden;
    }

    .eye::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      box-shadow: inset 0 6px 10px rgba(96, 115, 150, 0.1);
    }

    .pupil {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      border-radius: 50%;
      background: #533617;
      transform: translate3d(0, 0, 0);
      transition: transform 90ms linear;
    }

    .pupil::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
    }

    .mouth {
      position: absolute;
      left: 54px;
      top: 120px;
      width: 50px;
      height: 24px;
      border-bottom: 4px solid #3a2312;
      border-radius: 0 0 38px 38px;
      transition: transform 140ms ease, border-radius 140ms ease, height 140ms ease;
    }

    .mouth.smirk {
      width: 56px;
      height: 18px;
      left: 49px;
      border-bottom-width: 5px;
      border-radius: 0 0 34px 26px;
      transform: rotate(-6deg);
    }

    .mouth.gasp {
      width: 24px;
      height: 24px;
      left: 68px;
      border: 4px solid #3a2312;
      border-radius: 50%;
      background: rgba(125, 46, 46, 0.1);
    }

    .blush {
      position: absolute;
      top: 118px;
      width: 20px;
      height: 12px;
      border-radius: 999px;
      background: rgba(234, 144, 122, 0.35);
      filter: blur(1px);
    }

    .blush.left { left: 28px; }
    .blush.right { right: 28px; }

    .overalls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 92px;
      background: linear-gradient(180deg, #5c80da, var(--denim) 70%, var(--denim-dark));
      border-top: 4px solid #292116;
    }

    .bib {
      position: absolute;
      left: 46px;
      top: -15px;
      width: 60px;
      height: 58px;
      border-radius: 16px 16px 10px 10px;
      border: 4px solid #292116;
      background: linear-gradient(180deg, #6d8be0, #5073cf);
    }

    .pocket {
      position: absolute;
      left: 12px;
      bottom: 8px;
      width: 28px;
      height: 18px;
      border: 3px solid #1f2c55;
      border-top: none;
      border-radius: 0 0 8px 8px;
    }

    .strap-left,
    .strap-right {
      position: absolute;
      top: -16px;
      width: 18px;
      height: 48px;
      background: linear-gradient(180deg, #5f80d8, #4a6dc4);
      border: 4px solid #292116;
      border-radius: 12px;
    }

    .strap-left {
      left: -10px;
      transform: rotate(-20deg);
    }

    .strap-right {
      right: -10px;
      transform: rotate(20deg);
    }

    .button {
      position: absolute;
      top: 11px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f4d673;
      border: 2px solid #26334f;
    }

    .strap-left .button { right: 1px; }
    .strap-right .button { left: 1px; }

    .arm {
      position: absolute;
      top: 150px;
      width: 74px;
      height: 16px;
      background: var(--yellow);
      border: 4px solid #292116;
      border-radius: 999px;
      transform-origin: 10px center;
      transition: transform 180ms ease;
    }

    .arm.left {
      left: 4px;
      transform: rotate(26deg);
    }

    .arm.right {
      right: 0;
      transform: rotate(-18deg);
      transform-origin: 64px center;
    }

    .hand {
      position: absolute;
      top: -8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1d1716;
    }

    .arm.left .hand { left: -10px; }
    .arm.right .hand { right: -10px; }

    .leg {
      position: absolute;
      bottom: 24px;
      width: 18px;
      height: 86px;
      background: #24252c;
      border-radius: 999px;
      transform-origin: top center;
    }

    .leg.left {
      left: 92px;
      transform: rotate(4deg);
    }

    .leg.right {
      left: 130px;
      transform: rotate(-6deg);
    }

    .shoe {
      position: absolute;
      bottom: -6px;
      width: 48px;
      height: 22px;
      border-radius: 18px 18px 10px 10px;
      background: #1c1b20;
      box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.08);
    }

    .leg.left .shoe {
      left: -14px;
    }

    .leg.right .shoe {
      left: -16px;
    }

    .panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      position: relative;
    }

    .login-card {
      width: min(100%, 430px);
      padding: 30px;
      border-radius: 30px;
      background: var(--panel);
      border: 1px solid var(--panel-line);
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 54px rgba(77, 55, 15, 0.16);
    }

    .login-card h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 12px 0 26px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #533d16;
    }

    .field input {
      width: 100%;
      height: 52px;
      border: 1px solid rgba(118, 84, 16, 0.16);
      border-radius: var(--field-radius);
      padding: 0 16px;
      font-size: 15px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
    }

    .field input:focus {
      border-color: rgba(31, 95, 212, 0.6);
      box-shadow: 0 0 0 5px rgba(31, 95, 212, 0.12);
      transform: translateY(-1px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      color: var(--accent-strong);
    }

    .action {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #2c6cf1, #2351c8);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(35, 81, 200, 0.28);
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
    }

    .action:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 34px rgba(35, 81, 200, 0.34);
      filter: brightness(1.03);
    }

    .action:active {
      transform: translateY(0);
    }

    .status {
      min-height: 26px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: #197247;
    }

    .demo {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px dashed rgba(123, 91, 21, 0.18);
      color: #664f1e;
      font-size: 13px;
      line-height: 1.65;
    }

    .login-card.error {
      animation: card-bump 420ms ease;
    }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.7); opacity: 0.4; }
      50% { transform: scale(1.18); opacity: 1; }
    }

    @keyframes laugh-shake {
      0% { margin-left: 0; transform: translateY(0) rotate(0deg); }
      20% { margin-left: -8px; transform: translateY(-4px) rotate(-5deg); }
      40% { margin-left: 8px; transform: translateY(4px) rotate(5deg); }
      60% { margin-left: -6px; transform: translateY(2px) rotate(-4deg); }
      80% { margin-left: 5px; transform: translateY(-3px) rotate(3deg); }
      100% { margin-left: 0; transform: translateY(0) rotate(0deg); }
    }

    @keyframes card-bump {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    @media (max-width: 980px) {
      .stage {
        padding: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .playground {
        min-height: 540px;
        border-right: none;
        border-bottom: 1px solid rgba(157, 112, 24, 0.1);
      }

      .bubble {
        top: 250px;
      }

      .orbit {
        width: min(78vw, 420px);
        left: 56%;
        top: 63%;
      }

      .minion-group {
        left: 56%;
        top: 66%;
        width: min(82vw, 520px);
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: auto;
      }

      .playground {
        padding: 24px 20px 320px;
        min-height: 620px;
      }

      .panel {
        padding: 20px;
      }

      .login-card {
        padding: 24px 20px;
      }

      .title {
        font-size: 40px;
      }

      .bubble {
        left: 18px;
        right: 18px;
        max-width: none;
      }

      .orbit {
        left: 58%;
        top: auto;
        bottom: -12px;
        transform: translate(-50%, 0);
      }

      .minion-group {
        left: 53%;
        top: auto;
        bottom: -12px;
        width: 360px;
        height: 356px;
        transform: translateX(-50%);
      }

      .minion-wrap.front-left {
        left: 24px;
        bottom: 4px;
        transform: scale(0.72);
      }

      .minion-wrap.back-left {
        left: -8px;
        bottom: 68px;
        transform: scale(0.56);
      }

      .minion-wrap.back-right {
        right: 34px;
        bottom: 82px;
        transform: scale(0.62);
      }

      .minion-wrap.front-right {
        right: -10px;

        <section class="panel">
          <form class="login-card" id="loginCard" novalidate>

            <div class="field">
              <label for="username">账号</label>

  <script>
    const minionGroup = document.getElementById("minionGroup");
    const minionWraps = Array.from(document.querySelectorAll(".minion-wrap"));
    const pupils = Array.from(document.querySelectorAll(".pupil"));
    const mouths = Array.from(document.querySelectorAll(".mouth"));
    const leftArms = Array.from(document.querySelectorAll(".arm.left"));
    const rightArms = Array.from(document.querySelectorAll(".arm.right"));
    const bubble = document.getElementById("bubble");
    const loginCard = document.getElementById("loginCard");
    const status = document.getElementById("status");
    const username = document.getElementById("username");
    const password = document.getElementById("password");

    const mockAccount = {
      username: "xiaochunlin",
      password: "123456"
    };

    const roastLines = [
      "哈哈，这都能输错，我的护目镜都看乐了。",
      "再试一次吧，四个小黄人一起记住了你还没记住。",
      "密码方向不对，我们几个已经笑出声了。",
      "你输错的速度，比我们转眼珠还快。"
    ];

    const state = {
      pointerX: window.innerWidth * 0.5,
      pointerY: window.innerHeight * 0.5,
      passwordMode: false,
      laughTimer: null,
      bubbleTimer: null
    };

    function aimEyes() {
      pupils.forEach((pupil) => {
        const eyeOffset = state.passwordMode ? { x: -1, y: -0.15 } : getPointerVector(pupil);
        const max = 8;
        pupil.style.transform = "translate(" + (eyeOffset.x * max) + "px, " + (eyeOffset.y * max) + "px)";
      });
    }

    function getPointerVector(pupil) {
      const eye = pupil.parentElement;
      const rect = eye.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = state.pointerX - cx;
      const dy = state.pointerY - cy;
      const len = Math.hypot(dx, dy) || 1;
      return {
        x: dx / len,
        y: dy / len
      };
    }

    function setExpression(mode) {
      mouths.forEach((mouth) => {
        mouth.className = "mouth";
      });
      if (mode === "smirk") {
        mouths.forEach((mouth) => mouth.classList.add("smirk"));
        leftArms.forEach((arm) => { arm.style.transform = "rotate(14deg)"; });
        rightArms.forEach((arm) => { arm.style.transform = "rotate(-8deg)"; });
      } else if (mode === "gasp") {
        mouths.forEach((mouth) => mouth.classList.add("gasp"));
        leftArms.forEach((arm) => { arm.style.transform = "rotate(36deg)"; });
        rightArms.forEach((arm) => { arm.style.transform = "rotate(-32deg)"; });
      } else {
        leftArms.forEach((arm) => { arm.style.transform = "rotate(26deg)"; });
        rightArms.forEach((arm) => { arm.style.transform = "rotate(-18deg)"; });
      }
    }

    function showBubble(text, tone) {
      bubble.textContent = text;
      bubble.style.color = tone === "success" ? "#16553d" : "#6e1430";
      bubble.classList.add("show");
      clearTimeout(state.bubbleTimer);
      state.bubbleTimer = setTimeout(() => {
        bubble.classList.remove("show");
      }, 2400);
    }

    function setStatus(text, type) {
      status.textContent = text;
      status.className = "status " + (type || "");
    }

    function triggerLaugh() {
      clearTimeout(state.laughTimer);
      minionWraps.forEach((wrap) => wrap.classList.remove("laughing"));
      void minionGroup.offsetWidth;
      minionWraps.forEach((wrap) => wrap.classList.add("laughing"));
      setExpression("smirk");
      state.laughTimer = setTimeout(() => {
        minionWraps.forEach((wrap) => wrap.classList.remove("laughing"));
        if (state.passwordMode) {
          setExpression("gasp");
        } else {
          setExpression("");
        }
      }, 2400);
    }

    function updatePasswordMode(active) {
      state.passwordMode = active;
      setExpression(active ? "gasp" : "");
      aimEyes();
    }

    document.addEventListener("mousemove", (event) => {
      state.pointerX = event.clientX;
      state.pointerY = event.clientY;
      if (!state.passwordMode) {
        setExpression("");
      }
      aimEyes();
    });

    username.addEventListener("focus", () => {
      updatePasswordMode(false);
      showBubble("我盯着你呢，账号别输错。");
    });

    password.addEventListener("focus", () => {
      updatePasswordMode(true);
      showBubble("你输密码吧，我们先假装看向另一边。");
    });

    password.addEventListener("blur", () => {
      updatePasswordMode(false);
    });

    username.addEventListener("input", () => {
      if (username.value.trim()) {
        setExpression("");
      }
    });

    loginCard.addEventListener("submit", (event) => {
      event.preventDefault();
      const user = username.value.trim();
      const pass = password.value;

      if (!user || !pass) {
        setStatus("账号和密码都要填，四个小黄人已经开始皱眉了。", "error");
        showBubble("空着可不行，我们都没法笑话你。");
        setExpression("gasp");
        return;
      }

      if (user === mockAccount.username && pass === mockAccount.password) {
        document.body.innerHTML = ""
          + "<main style='min-height:100vh;display:grid;place-items:center;"
          + "background:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.42), transparent 20%),"
          + "linear-gradient(135deg,#ffe68a 0%,#f5c64d 45%,#eba52a 100%);"
          + "font-family:\"Microsoft YaHei\",\"PingFang SC\",\"Segoe UI\",sans-serif;'>"
          + "<div style='text-align:center;padding:32px;'>"
          + "<div style='font-size:clamp(58px,12vw,160px);font-weight:900;letter-spacing:-0.08em;"
          + "color:#3b2609;text-shadow:0 8px 22px rgba(255,255,255,0.28);'>傻狍子</div>"
          + "</div></main>";
        return;
      }

      const roast = roastLines[Math.floor(Math.random() * roastLines.length)];
      setStatus(roast, "error");
      showBubble(roast);
      loginCard.classList.remove("error");
      void loginCard.offsetWidth;
      loginCard.classList.add("error");
      triggerLaugh();
      password.value = "";
      password.focus();
    });

    window.addEventListener("resize", aimEyes);

    setExpression("");
    aimEyes();
  </script>
</body>
